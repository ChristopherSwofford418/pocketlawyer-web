<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketLawyer – AI Legal Help</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a2540;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 16px; }
    .logo span { color: #4f9ef8; }
    p { font-size: 1.1rem; color: #a0b8d0; max-width: 480px; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      background: #fff;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 40px;

    .badge img { height: 44px; display: block; }
    .links { display: flex; gap: 24px; font-size: 0.9rem; }

  <div class="logo">Pocket<span>Lawyer</span></div>

  <a class="badge" href="https://apps.apple.com/app/pocketlawyer/id6781106756" target="_blank" rel="noopener">

  <div class="links">
    <a href="/privacy">Privacy Policy</a>
